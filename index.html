<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traffic Light Controller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🚦 Traffic Light Controller</h1>

  <div id="lightBox">READY</div>

  <div class="buttons">
    <button onclick="changeLight('red')">Red</button>
    <button onclick="changeLight('yellow')">Yellow</button>
    <button onclick="changeLight('green')">Green</button>
    <button onclick="resetLight()">Reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
